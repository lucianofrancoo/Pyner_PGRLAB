<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PYNER — Paper Network</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8fafc;
  --bg2: #ffffff;
  --bg3: #f1f5f9;
  --text: #1e293b;
  --text2: #64748b;
  --text3: #94a3b8;
  --border: rgba(0,0,0,0.08);
  --accent: #3b82f6;
  --green: #059669;
  --yellow: #d97706;
  --red: #dc2626;
  --panel-bg: rgba(255,255,255,0.97);
  --card-bg: rgba(241,245,249,0.9);
}

[data-theme="dark"] {
  --bg: #0a0e17;
  --bg2: #111827;
  --bg3: #1e293b;
  --text: #e0e6f0;
  --text2: #8892a8;
  --text3: #4a5568;
  --border: rgba(255,255,255,0.06);
  --panel-bg: rgba(15,20,35,0.96);
  --card-bg: rgba(30,40,60,0.8);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
    transition: background 0.3s, color 0.3s;
}

/* Header */
.header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    padding: 10px 24px;
    background: var(--panel-bg);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
}

.header h1 {
    font-size: 16px;
    font-weight: 700;
    background: linear-gradient(135deg, #6ee7b7, #3b82f6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    white-space: nowrap;
}

.header-stats {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--text2);
}

.header-stats .val { color: var(--text); font-weight: 600; }

.header-right {
    display: flex;
    align-items: center;
    gap: 8px;
}

.legend {
    display: flex;
    gap: 12px;
    font-size: 11px;
    color: var(--text2);
}

.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }

/* Theme toggle */
.theme-btn {
    padding: 6px 12px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
}
.theme-btn:hover { color: var(--text); }

/* Side panel */
.side-panel {
    position: fixed;
    top: 48px;
    left: 0;
    bottom: 0;
    width: 240px;
    background: var(--panel-bg);
    backdrop-filter: blur(12px);
    border-right: 1px solid var(--border);
    z-index: 90;
    padding: 16px;
    overflow-y: auto;
    transition: transform 0.3s;
}

.side-panel.collapsed {
    transform: translateX(-240px);
}

.filter-section {
    margin-bottom: 16px;
}

.filter-title {
    font-size: 10px;
    font-weight: 700;
    color: var(--green);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
}

.filter-option {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 0;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    transition: color 0.15s;
}
.filter-option:hover { color: var(--text); }
.filter-option input { accent-color: var(--accent); }
.filter-option.active { color: var(--text); }

.filter-count {
    margin-left: auto;
    font-size: 10px;
    color: var(--text3);
    background: var(--bg3);
    padding: 1px 6px;
    border-radius: 8px;
}

/* Relevance slider */
.relevance-slider {
    width: 100%;
    margin: 8px 0;
    accent-color: var(--accent);
}

.relevance-display {
    font-size: 12px;
    color: var(--text2);
    text-align: center;
}

/* SVG */
#graph {
    width: 100%;
    height: 100vh;
    display: block;
}

/* Node labels */
.node-label {
    font-size: 9px;
    fill: var(--text2);
    pointer-events: none;
    text-anchor: middle;
    font-weight: 500;
}

.node-year {
    font-size: 8px;
    fill: var(--text3);
    pointer-events: none;
    text-anchor: middle;
}

/* Tooltip */
.tooltip {
    position: fixed;
    padding: 16px 20px;
    background: var(--panel-bg);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.5;
    max-width: 440px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 200;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.tooltip.visible { opacity: 1; }
.tooltip .tt-title { font-weight: 700; font-size: 14px; color: var(--text); margin-bottom: 6px; line-height: 1.4; }
.tooltip .tt-meta { color: var(--text2); font-size: 11px; margin-bottom: 6px; }
.tooltip .tt-score { display: inline-block; padding: 2px 10px; border-radius: 12px; font-weight: 700; font-size: 12px; margin-bottom: 6px; }
.tooltip .tt-score.high { background: rgba(16,185,129,0.2); color: #34d399; }
.tooltip .tt-score.mid { background: rgba(245,158,11,0.2); color: #fbbf24; }
.tooltip .tt-score.low { background: rgba(239,68,68,0.2); color: #f87171; }
.tooltip .tt-section { margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); }
.tooltip .tt-label { font-size: 10px; font-weight: 600; color: var(--green); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
.tooltip .tt-value { color: var(--text2); font-size: 12px; }

/* Edges */
.edge { stroke-opacity: 0.12; stroke-width: 1; }
.edge.organism { stroke: var(--accent); }
.edge.journal { stroke: var(--text3); stroke-dasharray: 4 4; }

/* Controls */
.controls {
    position: fixed;
    bottom: 16px;
    right: 16px;
    display: flex;
    gap: 6px;
    z-index: 100;
}
.controls button {
    padding: 6px 14px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text2);
    font-size: 11px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: all 0.2s;
}
.controls button:hover { color: var(--text); }

.info-panel {
    position: fixed;
    bottom: 16px;
    left: 250px;
    font-size: 10px;
    color: var(--text3);
    z-index: 100;
    transition: left 0.3s;
}
.info-panel.shifted { left: 16px; }
</style>
</head>

<svg id="graph"></svg>

<div class="controls">

</div>
